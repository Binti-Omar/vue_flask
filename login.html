<body>

    <div class="container" id="app">
        <form name="form" @submit.prevent="loginuser">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" v-model="email" class="form-control" id="email" placeholder="Enter your email">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" v-model="password" class="form-control" id="password"
                    placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <div class="alert alert-success" v-if="alertsuccessshow" role="alert">
            {{alertmessage}}
        </div>
        <div class="alert alert-danger" v-if="alerterrorshow" role="alert">
            {{alertmessage}}
        </div>

    <!-- <script>
        $(document).ready(function () {

    <script>
        new Vue({
            el: "#log",
            data: {
                email: "",
                password: "",
                alertsuccessshow: false,
                alerterrorshow: false,
                alertmessage: "",
                login: []
            },
            methods: {
                async loginuser() {
                    if (this.email == "" || this.password == "") {
                        this.alerterrorshow = true;
                        this.alertmessage = "Ensure all fields are filled!!!"
                    } else {
                        axios.post("http://127.0.0.1:5000/login", {
                            email: this.email,
                            password: this.password,
                        })
                            .then((response) => {
                                console.log(response.data);
                                this.alerterrorshow = false;
                                this.alertsuccessshow = true;
                                this.alertmessage = "User login successfully";
                            })
                            .catch((error) => {
                                console.error("Error registering user:", error);
                                this.alerterrorshow = true;
                                this.alertsuccessshow = false;
                                this.alertmessage = error;
                                console.log(this.email, this.password)
                            });
                    }
                },
                getUser() {
                    axios.get("http://127.0.0.1:5000/login")
                        .then((response) => {
                            console.log(response.data.data);
                            this.login = response.data.data;
                            this.$nextTick(() => {
                                $('#exam').DataTable();
                            });
                        })
                        .catch((error) => {
                            this.alertErrorShow = true;
                            this.alertSuccessShow = false;
                            this.alertMessage = "Something went wrong.";
                        });
                }
            },
            mounted() {
                this.getUser()
            },
        });

    </script>
</body>
